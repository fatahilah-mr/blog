backend:
  name: github
  repo: fatahilah-mr/blog
  branch: main
  base_url: https://blog.fatahmr.my.id
  auth_endpoint: oauth/auth

logo_url: /favicon.svg

media_folder: "public/uploads"
public_folder: "/uploads"

i18n:
  structure: multiple_files
  locales: [id, en]
  default_locale: id

collections:
  - name: "blog"
    label: "📝 Artikel Blog"
    folder: "src/content/blog"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/blog/{{slug}}"
    i18n: true
    fields:
      - { label: "Judul / Title", name: "title", widget: "string", i18n: true }
      - { label: "Deskripsi", name: "description", widget: "text", i18n: true }
      - { label: "Tanggal Terbit", name: "pubDate", widget: "datetime", i18n: duplicate }
      - { label: "Gambar Utama", name: "heroImage", widget: "image", required: false, i18n: duplicate }
      - { label: "Tags", name: "tags", widget: "list", required: false, i18n: duplicate }
      - { label: "Draft?", name: "draft", widget: "boolean", default: false, i18n: duplicate }
      - { label: "Proyek Terkait", name: "project", widget: "string", required: false, i18n: duplicate }
      - { label: "Konten", name: "body", widget: "markdown", i18n: true }

  - name: "projects"
    label: "🚀 Proyek"
    folder: "src/content/projects"
    create: true
    delete: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Nama Proyek", name: "title", widget: "string", i18n: true }
      - { label: "Deskripsi", name: "description", widget: "text", i18n: true }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["active", "completed", "archived"]
        i18n: duplicate
      - { label: "Tech Stack", name: "techStack", widget: "list", i18n: duplicate }
      - { label: "URL Repo", name: "repoUrl", widget: "string", required: false, i18n: duplicate }
      - { label: "URL Demo", name: "demoUrl", widget: "string", required: false, i18n: duplicate }
      - { label: "Gambar", name: "heroImage", widget: "image", required: false, i18n: duplicate }
      - { label: "Featured?", name: "featured", widget: "boolean", default: false, i18n: duplicate }
      - { label: "Tanggal Mulai", name: "startDate", widget: "datetime", i18n: duplicate }
      - { label: "Deskripsi Panjang", name: "body", widget: "markdown", i18n: true }
